<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexitree — Tour Complète (208 mots)</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #07071a;
  color: #e8e2d4;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 24px 56px;
}

/* ── Header ── */
.header {
  width: 100%; max-width: 820px;
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.header-left h1 { font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: #4a4a6a; margin-bottom: 5px; }
.header-left p  { font-size: 20px; font-weight: 300; color: #c8c0dc; letter-spacing: -0.01em; }
.header-left p span { color: #ffa040; font-weight: 600; }
.header-stats { display: flex; gap: 24px; padding-top: 4px; }
.stat { text-align: right; }
.stat-value { font-size: 24px; font-weight: 700; color: #ffa040; line-height: 1; letter-spacing: -0.02em; }
.stat-label  { font-size: 10px; color: #4a4a6a; margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }

/* ── Controls ── */
.controls {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
}
.ctrl-btn {
  padding: 6px 14px; border-radius: 6px; border: 1px solid #22223a;
  background: #0f0f22; color: #6060a0; font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  transition: all 0.15s ease;
}
.ctrl-btn:hover { border-color: #3a3a6a; color: #9090c0; }
.ctrl-btn.active { background: #1a1a36; border-color: #5ac8fa; color: #5ac8fa; }

.eval-note {
  font-size: 11px; color: #3a3a5a; letter-spacing: 0.04em;
  padding: 6px 14px; background: #0a0a1a; border-radius: 6px;
  border: 1px solid #14142a;
}

/* ── Main layout ── */
.main { display: flex; align-items: flex-start; gap: 0; }

/* ── Level axis ── */
.level-axis { width: 72px; position: relative; height: 640px; flex-shrink: 0; }
.level-tick {
  position: absolute; right: 10px;
  display: flex; flex-direction: column; align-items: flex-end;
  transform: translateY(-50%);
}
.level-code {
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
  padding: 2px 7px; border-radius: 4px; line-height: 1.4;
}
.level-code.unlocked { color: #8a8aaa; background: #11112a; border: 1px solid #22223a; }
.level-code.current  { color: #5ac8fa; background: #0a1f30; border: 1px solid #1a4a6a; }
.level-code.locked   { color: #33334a; background: #0c0c1e; border: 1px solid #18182a; }
.level-count { font-size: 9px; color: #3a3a5a; margin-top: 3px; letter-spacing: 0.05em; }
.level-count.active  { color: #5a5a8a; }
.level-tick::after {
  content: ''; position: absolute; right: -10px; top: 50%;
  width: 10px; height: 1px; background: #22223a;
}
.level-tick.current-tick::after { background: #1a4a6a; }

/* ── Tower ── */
.tower-wrap { position: relative; }
.tower-svg { width: 420px; height: 640px; overflow: visible; display: block; }

/* ── Word nodes ── */
.word-node { cursor: pointer; transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1); transform-box: fill-box; transform-origin: center; }
.word-node:hover { transform: scale(2); }

.s-unseen  circle { fill: #11112a; stroke: #252540; stroke-width: 0.8; }
.s-seen    circle { fill: #2e1e08; stroke: #5a3a15; stroke-width: 0.8; }
.s-known   circle { fill: #7a4e10; stroke: #bb7820; stroke-width: 0.8; }
.s-mastered circle {
  fill: #ffaa30; stroke: #ffd070; stroke-width: 0.8;
  filter: drop-shadow(0 0 4px rgba(255,140,0,0.75)) drop-shadow(0 0 9px rgba(255,100,0,0.3));
}
@keyframes twinkle {
  0%,100% { opacity: 1; }
  45%     { opacity: 0.55; filter: drop-shadow(0 0 2px rgba(255,140,0,0.4)); }
}
.s-mastered circle { animation: twinkle var(--dur,2.4s) ease-in-out infinite var(--delay,0s); }
.ghost-node { pointer-events: none; }

/* POS colour mode */
body.pos-mode .s-unseen  circle,
body.pos-mode .s-seen    circle,
body.pos-mode .s-known   circle,
body.pos-mode .s-mastered circle { animation: none; filter: none; }
body.pos-mode .pos-verb      circle { fill: #3a7aff; stroke: #6a9aff; stroke-width: 0.8; }
body.pos-mode .pos-adjective circle { fill: #e05050; stroke: #ff8080; stroke-width: 0.8; }
body.pos-mode .pos-adverb    circle { fill: #30c070; stroke: #60e090; stroke-width: 0.8; }

/* ── Labels ── */
.word-label {
  font-size: 6.5px;
  fill: #0e0e22;  /* hidden = same as background */
  pointer-events: none;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  transition: fill 0.2s ease;
}
body.show-labels .word-label { fill: #8080b8; }
body.show-labels.pos-mode .word-label { fill: #6060a0; }

/* ── Tooltip ── */
#tooltip {
  position: fixed; z-index: 999; pointer-events: none; opacity: 0;
  transition: opacity 0.1s ease; background: #0d0d22;
  border: 1px solid #252540; border-radius: 8px; padding: 10px 14px;
  min-width: 160px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#tooltip.show { opacity: 1; }
.tt-word  { font-size: 15px; font-weight: 600; color: #ffaa30; letter-spacing: -0.01em; margin-bottom: 3px; }
.tt-pos   { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #4a4a6a; margin-bottom: 6px; }
.tt-def   { font-size: 12px; color: #9090b0; line-height: 1.5; margin-bottom: 9px; }
.tt-level { font-size: 10px; color: #3a3a6a; letter-spacing: 0.06em; }
.tt-pips  { display: flex; gap: 4px; align-items: center; margin-bottom: 6px; }
.pip { width: 6px; height: 6px; border-radius: 50%; background: #1e1e38; border: 1px solid #2e2e50; flex-shrink: 0; }
.pip.on { background: #ffaa30; border-color: #ffd070; }
.tt-mastery { font-size: 10px; color: #4a4a6a; margin-left: 5px; letter-spacing: 0.05em; }

/* ── Legend ── */
.legend-wrap { margin-top: 28px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.legend { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #4a4a6a; letter-spacing: 0.04em; }
.ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.legend-pos { display: none; gap: 20px; flex-wrap: wrap; justify-content: center; }
body.pos-mode .legend-mastery { display: none; }
body.pos-mode .legend-pos { display: flex; }

.count-badge {
  font-size: 10px; color: #3a3a5a; letter-spacing: 0.05em;
  margin-top: 8px; text-align: center;
}
</style>
</head>

// ── Demo mastery assignment ───────────────────────────────────────────────────
// A1: mostly mastered (graduated level). A2: mixed progress. B1: current.
// B2/C1/C2: locked.

function getMastery(idx, total, level) {
  if (level === 'B2' || level === 'C1' || level === 'C2') return M.LOCKED;
  const r = idx / total;
  if (level === 'A1') {
    if (r < 0.54) return M.MASTERED;
    if (r < 0.74) return M.KNOWN;
    if (r < 0.89) return M.SEEN;
    return M.UNSEEN;
  }
  if (level === 'A2') {
    if (r < 0.28) return M.MASTERED;
    if (r < 0.60) return M.KNOWN;
    if (r < 0.82) return M.SEEN;
    return M.UNSEEN;
  }
  // B1 current
  if (r < 0.14) return M.KNOWN;
  if (r < 0.38) return M.SEEN;
  return M.UNSEEN;
}

// ── Position computation ──────────────────────────────────────────────────────

// Pack `count` nodes into a rectangle, rows L→R, top→bottom
function packRect(x1, y1, x2, y2, count, sp) {
  const w = x2 - x1;
  const cols = Math.max(1, Math.floor(w / sp));
  const actualSp = w / cols;
  const positions = [];
  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    positions.push({ x: x1 + actualSp * (col + 0.5), y: y1 + sp * (row + 0.5) });
  }
  return positions;
}

// Pack nodes into an upward-pointing triangle (Eiffel pyramid)
// Fills from base row upward, centering each row
function packTriangle(apexX, apexY, baseY, baseHalfW, count, sp) {
  const positions = [];
  // Start from base, go up
  for (let y = baseY - sp * 0.5; y > apexY && positions.length < count; y -= sp) {
    const t = (y - apexY) / (baseY - apexY); // 0 at apex, 1 at base
    const hw = baseHalfW * t;
    const cols = Math.max(1, Math.floor((hw * 2) / sp));
    const rowW = cols * sp;
    for (let c = 0; c < cols && positions.length < count; c++) {
      positions.push({ x: apexX - rowW / 2 + sp * (c + 0.5), y });
    }
  }
  return positions;
}

// ── Build flat WORDS array with positions ─────────────────────────────────────

const SP = 8.5; // node spacing
const WORDS = [];

// Level → zone definitions
const ZONES = {
  C2:   () => packTriangle(210, 78, 155, 31, VOCAB.C2.length, SP),
  C1:   () => packRect(176, 173, 244, 250, VOCAB.C1.length, SP),
  B2:   () => packRect(132, 300, 288, 340, VOCAB.B2.length, SP),
  B1:   () => packRect(132, 260, 288, 297, VOCAB.B1.length, SP),
  A2:   () => packRect(104, 339, 316, 358, VOCAB.A2.length, SP),
  // A1 split between left and right leg
  A1: (words) => {
    const half = Math.ceil(words.length / 2);
    const left  = packRect(44, 371, 150, 573, half,               SP + 1);
    const right = packRect(270, 371, 376, 573, words.length - half, SP + 1);
    return [...left, ...right];
  },
};

['C2','C1','B2','B1','A2','A1'].forEach(level => {
  const words = VOCAB[level];
  const positions = level === 'A1' ? ZONES.A1(words) : ZONES[level]();
  words.forEach((w, i) => {
    WORDS.push({
      level,
      word:  w.word,
      def:   w.def,
      pos:   w.pos,
      m:     getMastery(i, words.length, level),
      svgX:  positions[i] ? positions[i].x : 210,
      svgY:  positions[i] ? positions[i].y : 300,
    });
  });
});

// ── SVG helpers ───────────────────────────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const el = document.createElementNS(SVG_NS, tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}

// ── Render nodes ──────────────────────────────────────────────────────────────
function renderNodes() {
  const g = document.getElementById('nodes-g');
  const lg = document.getElementById('labels-g');

  WORDS.forEach((w, i) => {
    if (w.m === M.LOCKED) {
      const el = svgEl('circle', {
        cx: w.svgX, cy: w.svgY, r: RADIUS[M.LOCKED],
        fill: '#0e0e20', stroke: '#1a1a30', 'stroke-width': '0.5', opacity: '0.35'
      });
      g.appendChild(el);
      return;
    }

    const grp = document.createElementNS(SVG_NS, 'g');
    grp.setAttribute('class', `word-node ${MASTERY_CLASSES[w.m]} pos-${w.pos}`);
    grp.setAttribute('data-i', i);

    const c = svgEl('circle', { cx: w.svgX, cy: w.svgY, r: RADIUS[w.m] });
    if (w.m === M.MASTERED) {
      c.style.setProperty('--delay', (Math.random() * 4).toFixed(1) + 's');
      c.style.setProperty('--dur',   (1.8 + Math.random() * 2.2).toFixed(1) + 's');
    }
    grp.appendChild(c);
    grp.addEventListener('mouseenter', e => showTip(e, w));
    grp.addEventListener('mousemove',  e => moveTip(e));
    grp.addEventListener('mouseleave', hideTip);
    g.appendChild(grp);

    // Label (hidden by CSS until .show-labels on body)
    const labelAnchor = w.svgX < 210 ? 'end' : 'start';
    const labelDx = w.svgX < 210 ? -5 : 5;
    const lbl = svgEl('text', {
      x: w.svgX + labelDx, y: w.svgY + 2,
      'text-anchor': labelAnchor,
      'font-size': '6',
      'font-family': '-apple-system,BlinkMacSystemFont,sans-serif',
    });
    lbl.setAttribute('class', 'word-label');
    lbl.textContent = w.word;
    lg.appendChild(lbl);
  });
}

// ── Locked overlays ───────────────────────────────────────────────────────────
function renderLocked() {
  const g = document.getElementById('locked-g');
  LOCKED_ZONES.forEach(zone => {
    const poly = svgEl('polygon', {
      points: zone.pts.map(p => p.join(',')).join(' '),
      fill: 'rgba(7,7,26,0.58)'
    });
    g.appendChild(poly);
    if (zone.label && zone.lx != null) {
      const txt = svgEl('text', {
        x: zone.lx, y: zone.ly, 'text-anchor': 'middle',
        'font-size': '8', fill: '#2a2a45', 'font-weight': '600',
        'letter-spacing': '1',
        'font-family': '-apple-system,BlinkMacSystemFont,sans-serif'
      });
      txt.textContent = '— ' + zone.label + ' —';
      g.appendChild(txt);
    }
  });
  // Antenna strip
  g.appendChild(svgEl('rect', { x:204, y:10, width:12, height:66, fill:'rgba(7,7,26,0.55)', rx:2 }));
}

// ── Level axis ────────────────────────────────────────────────────────────────
function renderAxis() {
  const axis = document.getElementById('level-axis');
  ['C2','C1','B2','B1','A2','A1'].forEach(lvl => {
    const cfg = LEVEL_CFG[lvl];
    const words    = WORDS.filter(w => w.level === lvl);
    const mastered = words.filter(w => w.m === M.MASTERED).length;
    const total    = words.length;
    const cls = cfg.locked ? 'locked' : cfg.current ? 'current' : 'unlocked';
    const tick = document.createElement('div');
    tick.className = 'level-tick' + (cfg.current ? ' current-tick' : '');
    tick.style.top = cfg.axisY + 'px';
    tick.innerHTML = `
      <div class="level-code ${cls}">${lvl}</div>
      <div class="level-count${!cfg.locked ? ' active' : ''}">
        ${cfg.locked ? '–' : mastered + '/' + total}
      </div>`;
    axis.appendChild(tick);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const active   = WORDS.filter(w => w.m !== M.LOCKED);
  const mastered = WORDS.filter(w => w.m === M.MASTERED).length;
  const locked   = WORDS.filter(w => w.m === M.LOCKED).length;
  const pct = Math.round(mastered / active.length * 100);
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-locked').textContent = locked;
  document.getElementById('pct').textContent = pct;
  // word count breakdown
  const byLevel = ['A1','A2','B1','B2','C1','C2'].map(l =>
    `${l}: ${VOCAB[l].length}`
  ).join(' · ');
  document.getElementById('count-badge').textContent = byLevel;
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');

function showTip(e, w) {
  document.getElementById('tt-word').textContent  = w.word;
  document.getElementById('tt-pos').textContent   = w.pos;
  document.getElementById('tt-def').textContent   = w.def;
  document.getElementById('tt-level').textContent = `Niveau ${w.level} · ${MASTERY_LABELS[w.m]}`;
  const pips = document.getElementById('tt-pips');
  const filled = w.m === M.MASTERED ? 6 : w.m === M.KNOWN ? 3 : w.m === M.SEEN ? 1 : 0;
  pips.innerHTML = '';
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'pip' + (i < filled ? ' on' : '');
    pips.appendChild(p);
  }
  const lbl = document.createElement('span');
  lbl.className = 'tt-mastery';
  lbl.textContent = MASTERY_LABELS[w.m];
  pips.appendChild(lbl);
  tip.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  const x = e.clientX + 16, y = e.clientY - 12;
  tip.style.left = Math.min(x, innerWidth - 200) + 'px';
  tip.style.top  = Math.min(y, innerHeight - 150) + 'px';
}
function hideTip() { tip.classList.remove('show'); }
