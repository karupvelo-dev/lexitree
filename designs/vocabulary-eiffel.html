<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lexitree — Tour de Vocabulaire</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #07071a;
  color: #e8e2d4;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* ── Stars canvas ─────────────────────────────────────────────────────── */
#stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── App shell ────────────────────────────────────────────────────────── */
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 24px 56px;
}

/* ── Header ───────────────────────────────────────────────────────────── */
.header {
  width: 100%;
  max-width: 760px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 44px;
}

.header-left h1 {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #4a4a6a;
  margin-bottom: 6px;
}

.header-left p {
  font-size: 22px;
  font-weight: 300;
  color: #c8c0dc;
  letter-spacing: -0.01em;
}

.header-left p span {
  color: #ffa040;
  font-weight: 600;
}

.header-stats {
  display: flex;
  gap: 28px;
  padding-top: 4px;
}

.stat { text-align: right; }

.stat-value {
  font-size: 26px;
  font-weight: 700;
  color: #ffa040;
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-label {
  font-size: 10px;
  color: #4a4a6a;
  margin-top: 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── Main layout ──────────────────────────────────────────────────────── */
.main {
  display: flex;
  align-items: flex-start;
  gap: 0;
}

/* ── Level axis ───────────────────────────────────────────────────────── */
.level-axis {
  width: 72px;
  position: relative;
  /* height matches SVG */
  height: 640px;
  flex-shrink: 0;
}

.level-tick {
  position: absolute;
  right: 10px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  transform: translateY(-50%);
}

.level-code {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  padding: 2px 7px;
  border-radius: 4px;
  line-height: 1.4;
}

.level-code.unlocked { color: #8a8aaa; background: #11112a; border: 1px solid #22223a; }
.level-code.current  { color: #5ac8fa; background: #0a1f30; border: 1px solid #1a4a6a; }
.level-code.locked   { color: #33334a; background: #0c0c1e; border: 1px solid #18182a; }

.level-count {
  font-size: 9px;
  color: #3a3a5a;
  margin-top: 3px;
  letter-spacing: 0.05em;
}

.level-count.active { color: #5a5a8a; }

/* connector line */
.level-tick::after {
  content: '';
  position: absolute;
  right: -10px;
  top: 50%;
  width: 10px;
  height: 1px;
  background: #22223a;
}

.level-tick.current-tick::after { background: #1a4a6a; }

/* ── Tower SVG ────────────────────────────────────────────────────────── */
.tower-wrap {
  position: relative;
}

.tower-svg {
  width: 420px;
  height: 640px;
  overflow: visible;
  display: block;
}

/* ── Word nodes ───────────────────────────────────────────────────────── */
.word-node {
  cursor: pointer;
  transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
  transform-box: fill-box;
  transform-origin: center;
}

.word-node:hover { transform: scale(1.7); }

/* state: unseen */
.s-unseen circle { fill: #11112a; stroke: #252540; stroke-width: 1; }
/* state: seen (1-2×) */
.s-seen circle   { fill: #2e1e08; stroke: #5a3a15; stroke-width: 1; }
/* state: known (3-5×) */
.s-known circle  { fill: #7a4e10; stroke: #bb7820; stroke-width: 1; }
/* state: mastered (6+×) */
.s-mastered circle {
  fill: #ffaa30;
  stroke: #ffd070;
  stroke-width: 1;
  filter: drop-shadow(0 0 5px rgba(255,140,0,0.8)) drop-shadow(0 0 12px rgba(255,100,0,0.35));
}

@keyframes twinkle {
  0%,100% { opacity: 1; }
  45%     { opacity: 0.6; filter: drop-shadow(0 0 2px rgba(255,140,0,0.5)); }
}

.s-mastered circle { animation: twinkle var(--dur, 2.4s) ease-in-out infinite var(--delay, 0s); }

/* locked ghost nodes */
.ghost-node { pointer-events: none; }

/* ── Tooltip ──────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  z-index: 999;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s ease;
  background: #0d0d22;
  border: 1px solid #252540;
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 160px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

#tooltip.show { opacity: 1; }

.tt-word {
  font-size: 16px;
  font-weight: 600;
  color: #ffaa30;
  letter-spacing: -0.01em;
  margin-bottom: 3px;
}

.tt-pos {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #4a4a6a;
  margin-bottom: 7px;
}

.tt-def {
  font-size: 13px;
  color: #9090b0;
  line-height: 1.5;
  margin-bottom: 10px;
}

.tt-pips {
  display: flex;
  gap: 5px;
  align-items: center;
}

.pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #1e1e38;
  border: 1px solid #2e2e50;
  flex-shrink: 0;
}

.pip.on { background: #ffaa30; border-color: #ffd070; }

.tt-mastery-label {
  font-size: 10px;
  color: #4a4a6a;
  margin-left: 6px;
  letter-spacing: 0.05em;
}

/* ── Legend ───────────────────────────────────────────────────────────── */
.legend {
  display: flex;
  gap: 22px;
  margin-top: 36px;
  flex-wrap: wrap;
  justify-content: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: #4a4a6a;
  letter-spacing: 0.04em;
}

.ld {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="app">

          <line x1="131" y1="358" x2="50"  y2="582"/>
          <line x1="147" y1="358" x2="166" y2="582"/>
          <line x1="273" y1="358" x2="254" y2="582"/>
          <line x1="289" y1="358" x2="370" y2="582"/>
          <line x1="115" y1="440" x2="166" y2="440"/>

        <!-- Cross-bracing on body (decorative) -->

          <line x1="160" y1="254" x2="260" y2="344"/>

        <!-- Node layer (JS-populated) -->

          <polygon points="119,299 125,302 119,305" fill="#3a8fd0" opacity="0.7"/>
        </g>

      </svg>
    </div>

  </div><!-- /main -->

  <!-- Legend -->

      Non vu

    <div class="legend-item">

</div><!-- /app -->

// ── Level config ─────────────────────────────────────────────────────────────

const LEVEL_CFG = {
  A1: { label:'Débutant',           locked:false, current:false, axisY:480 },
  A2: { label:'Élémentaire',        locked:false, current:false, axisY:348 },

// Locked zone polygon definitions (in SVG coords)
const LOCKED_ZONES = [
  // B2: lower bell upper half
  { pts:[[160,254],[260,254],[260,254],[298,344],[122,344]], label:'B2', lx:210, ly:300 },
  // C1: upper-middle body
  { pts:[[172,169],[248,169],[260,254],[160,254]], label:'C1', lx:210, ly:212 },

  { pts:[[176,158],[244,158],[248,169],[172,169]], label:null,  lx:null, ly:null },

// ── Stars ─────────────────────────────────────────────────────────────────────

(function initStars() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * c.width;
    const y = Math.random() * c.height * 0.75;
    const r = Math.random() * 1.1;
    const a = 0.15 + Math.random() * 0.55;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200,200,255,${a})`;
    ctx.fill();
  }
})();

// ── Render nodes ──────────────────────────────────────────────────────────────

function renderNodes() {
  const g = document.getElementById('nodes-g');

  WORDS.forEach((w, i) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    if (w.m === M.LOCKED) {
      // ghost dot
      el.setAttribute('class', 'ghost-node');
      const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', w.pos.x); c.setAttribute('cy', w.pos.y);
      c.setAttribute('r', RADIUS[M.LOCKED]);
      c.setAttribute('fill', '#0e0e20');
      c.setAttribute('stroke', '#1c1c30');
      c.setAttribute('stroke-width', '0.6');
      c.setAttribute('opacity', '0.35');
      el.appendChild(c);
      g.appendChild(el);
      return;
    }

    el.setAttribute('class', `word-node ${MASTERY_CLASSES[w.m]}`);
    el.setAttribute('data-i', i);

    const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    c.setAttribute('cx', w.pos.x); c.setAttribute('cy', w.pos.y);
    c.setAttribute('r', RADIUS[w.m]);

    if (w.m === M.MASTERED) {
      const delay = (Math.random() * 4).toFixed(1) + 's';
      const dur   = (1.8 + Math.random() * 2.2).toFixed(1) + 's';
      c.style.setProperty('--delay', delay);
      c.style.setProperty('--dur', dur);
    }

    el.appendChild(c);
    el.addEventListener('mouseenter', e => showTip(e, w));
    el.addEventListener('mousemove',  e => moveTip(e));
    el.addEventListener('mouseleave', hideTip);
    g.appendChild(el);
  });
}

// ── Locked overlays ───────────────────────────────────────────────────────────

function renderLocked() {
  const g = document.getElementById('locked-g');

  LOCKED_ZONES.forEach(zone => {
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', zone.pts.map(p => p.join(',')).join(' '));
    poly.setAttribute('fill', 'rgba(7,7,26,0.64)');
    g.appendChild(poly);

    if (zone.label && zone.lx != null) {
      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', zone.lx); txt.setAttribute('y', zone.ly);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '8');
      txt.setAttribute('fill', '#2a2a45');
      txt.setAttribute('font-weight', '600');
      txt.setAttribute('letter-spacing', '1');
      txt.setAttribute('font-family', '-apple-system,BlinkMacSystemFont,sans-serif');
      txt.textContent = '— ' + zone.label + ' —';
      g.appendChild(txt);
    }
  });

  // Antenna locked strip
  const ar = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  ar.setAttribute('x','204'); ar.setAttribute('y','10');
  ar.setAttribute('width','12'); ar.setAttribute('height','66');
  ar.setAttribute('fill','rgba(7,7,26,0.6)'); ar.setAttribute('rx','2');
  g.appendChild(ar);
}

// ── Level axis labels ─────────────────────────────────────────────────────────

function renderAxis() {
  const axis = document.getElementById('level-axis');
  const levels = ['C2','C1','B2','B1','A2','A1'];

  levels.forEach(lvl => {
    const cfg = LEVEL_CFG[lvl];
    const words = WORDS.filter(w => w.level === lvl);
    const mastered = words.filter(w => w.m === M.MASTERED).length;
    const total = words.length;

    const tick = document.createElement('div');
    tick.className = 'level-tick' + (cfg.current ? ' current-tick' : '');
    tick.style.top = cfg.axisY + 'px';

    const cls = cfg.locked ? 'locked' : cfg.current ? 'current' : 'unlocked';
    tick.innerHTML = `
      <div class="level-code ${cls}">${lvl}</div>
      <div class="level-count${!cfg.locked ? ' active' : ''}">
        ${cfg.locked ? '–' : mastered + '/' + total}
      </div>`;
    axis.appendChild(tick);
  });
}

// ── Tooltip ───────────────────────────────────────────────────────────────────

const tip     = document.getElementById('tooltip');
const ttWord  = document.getElementById('tt-word');
const ttPos   = document.getElementById('tt-pos');
const ttDef   = document.getElementById('tt-def');
const ttPips  = document.getElementById('tt-pips');

function showTip(e, w) {
  ttWord.textContent = w.word;
  ttPos.textContent  = w.pos_;
  ttDef.textContent  = w.def;

  // mastery pips (max 6)
  const pipCount = 6;
  const filled   = w.m === M.MASTERED ? 6 : w.m === M.KNOWN ? 3 : w.m === M.SEEN ? 1 : 0;
  ttPips.innerHTML = '';
  for (let i = 0; i < pipCount; i++) {
    const p = document.createElement('div');
    p.className = 'pip' + (i < filled ? ' on' : '');
    ttPips.appendChild(p);
  }
  const lbl = document.createElement('span');
  lbl.className = 'tt-mastery-label';
  lbl.textContent = MASTERY_LABELS[w.m];
  ttPips.appendChild(lbl);

  tip.classList.add('show');
  moveTip(e);
}

function moveTip(e) {
  const x = e.clientX + 16, y = e.clientY - 12;
  tip.style.left = Math.min(x, innerWidth - 200) + 'px';
  tip.style.top  = Math.min(y, innerHeight - 140) + 'px';
}

function hideTip() { tip.classList.remove('show'); }

// ── Stats ─────────────────────────────────────────────────────────────────────

function updateStats() {
  const total    = WORDS.filter(w => w.m !== M.LOCKED).length;
  const mastered = WORDS.filter(w => w.m === M.MASTERED).length;
  const seen     = WORDS.filter(w => w.m !== M.LOCKED && w.m !== M.UNSEEN).length;
  const pct      = Math.round(mastered / total * 100);

  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-seen').textContent = seen;
  document.getElementById('pct').textContent = pct;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

renderNodes();
renderLocked();
renderAxis();
updateStats();
</script>
</body>
</html>
